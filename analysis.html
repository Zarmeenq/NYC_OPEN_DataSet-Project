<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Analysis</title>

  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="c3.css" rel="stylesheet" type="text/css" />

  <script src="d3.js"></script>
  <script src="c3.js"></script>
  <script src="script.js"></script>

  <style>
    #chart {
      margin-top: 20px;
    }
  </style>
</head>

<body onload="init()">

  <div id="banner3" class="container center">
    <div style="text-align:center">
      <h1>NYC Open Data</h1>
      <h2>Filtering Police Arrests</h2>
    </div>
  </div>

  <nav class="container">
    <a href="index.html">Home Page</a>
    <a href="info.html">Information</a>
    <a href="analysis.html">Analysis</a>
  </nav>

  <h1>Police Arrest Analysis</h1>

  <div class="container">
    <div id="panel">

      <div class="card">
        <h3>Chart Type</h3>
        <select id="chartType">
          <option value="bar">Bar</option>
          <option value="pie">Pie</option>
          <option value="line">Line</option>
        </select>
      </div>

      <div class="card">
        <h3>Filter Arrest By Race</h3>
        <p><span class="highlight">Scenario:</span> Aggregate arrests by race.</p>
        <a class="button" onclick="arrestByRace()">Show Chart</a>
      </div>

      <div class="card">
        <h3>Filter Arrest By Age Group</h3>
        <p><span class="highlight">Scenario:</span> Aggregate arrests by age group.</p>
        <a class="button" onclick="arrestByAgeGroup()">Show Chart</a>
      </div>

      <div class="card">
        <div id="chart"></div>
      </div>

    </div>
  </div>

</body>
</html>
